<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Motion Converter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <path d="m17 8-5-5-5 5"></path>
        <path d="M12 3v12"></path>
      </symbol>
      <symbol id="icon-sparkles" viewBox="0 0 24 24">
        <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"></path>
        <path d="M5 3v4"></path>
        <path d="M19 17v4"></path>
        <path d="M3 5h4"></path>
        <path d="M17 19h4"></path>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="m6 3 15 9-15 9Z"></path>
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <path d="M7 10l5 5 5-5"></path>
        <path d="M12 15V3"></path>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 0-15-6.7L3 8"></path>
        <path d="M3 3v5h5"></path>
        <path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"></path>
        <path d="M16 16h5v5"></path>
      </symbol>
      <symbol id="icon-image" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <circle cx="9" cy="9" r="2"></circle>
        <path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"></path>
      </symbol>
      <symbol id="icon-video" viewBox="0 0 24 24">
        <path d="m16 13 5.2 3.1a.5.5 0 0 0 .8-.4V8.3a.5.5 0 0 0-.8-.4L16 11"></path>
        <rect x="2" y="6" width="14" height="12" rx="2"></rect>
      </symbol>
    </svg>

    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">
            <svg><use href="#icon-sparkles"></use></svg>
          </span>
          <span>
            <strong>Live Motion</strong>
            <small>Convertidor social</small>
          </span>
        </div>
        <div class="status-pill" id="qualityPill">Resolucion original</div>
      </header>

      <main class="workspace">
        <section class="stage-panel" aria-label="Vista previa">
          <div class="stage">
            <canvas id="motionArt" aria-hidden="true"></canvas>
            <video id="sourceVideo" class="source-video" controls playsinline muted></video>
            <img id="outputPreview" class="output-preview" alt="Vista previa animada">
          </div>

          <label class="dropzone" id="dropzone" for="videoInput">
            <input id="videoInput" type="file" accept="video/*">
            <span class="drop-icon">
              <svg><use href="#icon-upload"></use></svg>
            </span>
            <span class="drop-main">Subir video</span>
            <span class="drop-sub">Arrastra o elige un archivo</span>
          </label>

          <div class="media-strip" aria-live="polite">
            <div>
              <span>Formato</span>
              <strong id="formatValue">APNG</strong>
            </div>
            <div>
              <span>Video</span>
              <strong id="sizeValue">Sin archivo</strong>
            </div>
            <div>
              <span>Duracion</span>
              <strong id="durationValue">0.0 s</strong>
            </div>
          </div>
        </section>

        <aside class="controls-panel" aria-label="Controles">
          <div class="panel-heading">
            <span class="panel-icon">
              <svg><use href="#icon-image"></use></svg>
            </span>
            <div>
              <h1>Live Photo animada</h1>
              <p>Imagen animada y video listo para redes.</p>
            </div>
          </div>

          <div class="control-group">
            <label>Repeticiones</label>
            <div class="segmented" role="radiogroup" aria-label="Repeticiones">
              <button class="segment is-active" type="button" data-loop="1" aria-checked="true">1</button>
              <button class="segment" type="button" data-loop="2" aria-checked="false">2</button>
              <button class="segment" type="button" data-loop="3" aria-checked="false">3</button>
            </div>
          </div>

          <div class="control-group">
            <label for="fpsSelect">Movimiento</label>
            <select id="fpsSelect">
              <option value="12">12 fps</option>
              <option value="24">24 fps</option>
              <option value="30" selected>30 fps</option>
              <option value="60">60 fps</option>
              <option value="90">90 fps</option>
            </select>
          </div>

          <div class="progress-card" id="progressCard">
            <div class="progress-top">
              <span id="statusText">Listo</span>
              <strong id="progressValue">0%</strong>
            </div>
            <div class="progress-track">
              <span id="progressBar"></span>
            </div>
          </div>

          <div class="action-row">
            <button id="convertButton" class="primary-button" type="button">
              <svg><use href="#icon-play"></use></svg>
              Crear APNG
            </button>
            <button id="resetButton" class="icon-button" type="button" title="Reiniciar">
              <svg><use href="#icon-refresh"></use></svg>
            </button>
          </div>

          <button id="tiktokButton" class="video-button" type="button">
            <svg><use href="#icon-video"></use></svg>
            Crear video TikTok
          </button>

          <a id="downloadButton" class="download-button is-disabled" download>
            <svg><use href="#icon-download"></use></svg>
            <span>Descargar APNG</span>
          </a>
          <a id="videoDownloadButton" class="download-button video-download is-disabled" download>
            <svg><use href="#icon-download"></use></svg>
            <span id="videoDownloadLabel">Descargar video</span>
          </a>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
